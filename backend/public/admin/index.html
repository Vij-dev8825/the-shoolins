<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Shoolins — Admin</title>
<style>
  :root {
    --gold: #ffb300;
    --gold-dark: #c17f00;
    --ivory: #fffbef;
    --surface: #ffffff;
    --surface-muted: #f7efd9;
    --divider: #e8dec7;
    --ink: #1f1b13;
    --muted: #7a7263;
    --error: #b3261e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--ivory);
    color: var(--ink);
  }
  header {
    background: var(--gold-dark);
    color: var(--surface);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
  header button {
    background: transparent;
    border: 1px solid var(--surface);
    color: var(--surface);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  main { max-width: 900px; margin: 0 auto; padding: 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .card h2 { margin-top: 0; font-size: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input, select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--divider);
    border-radius: 6px;
    font-size: 14px;
    background: var(--surface);
    color: var(--ink);
  }
  button.primary {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
  }
  button.primary:disabled { opacity: 0.6; cursor: default; }
  button.secondary {
    background: transparent;
    border: 1px solid var(--divider);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button.danger { color: var(--error); border-color: var(--error); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--divider); font-size: 14px; }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  img.thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; background: var(--surface-muted); }
  .gallery-thumb-wrap { position: relative; display: inline-block; }
  .gallery-thumb-wrap img.thumb { width: 64px; height: 64px; }
  .gallery-remove {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--error);
    color: var(--surface);
    border: none;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 0;
  }
  .row-actions { display: flex; gap: 8px; }
  .error { color: var(--error); font-size: 13px; margin-top: 8px; }
  .login-wrap {
    max-width: 340px;
    margin: 15vh auto;
    text-align: center;
  }
  .login-wrap h1 { font-size: 22px; margin-bottom: 24px; }
  #app { display: none; }
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <h1>The Shoolins Admin</h1>
  <div class="card" style="text-align:left">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Admin password" />
    <button class="primary" id="login-btn" style="width:100%">Log in</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div style="display:flex; align-items:center; gap:16px">
      <a href="/" style="color:var(--surface); opacity:0.85; font-size:14px">&larr; Site</a>
      <h1 style="margin:0">THE SHOOLINS — Product Admin</h1>
    </div>
    <button id="logout-btn">Log out</button>
  </header>
  <main>
    <div class="card">
      <h2 id="form-title">Add a product</h2>
      <input type="hidden" id="edit-id" />
      <label for="name">Name</label>
      <input id="name" type="text" placeholder="e.g. Denim Jacket" />

      <label for="price">Price (₹)</label>
      <input id="price" type="number" min="0" step="1" placeholder="e.g. 2999" />

      <label for="category">Category</label>
      <select id="category">
        <option value="women">Women</option>
        <option value="men">Men</option>
      </select>

      <label for="image">Product photo (cover)</label>
      <input id="image" type="file" accept="image/*" />
      <img id="preview" class="thumb" style="display:none; margin-top:10px" />

      <label for="gallery-input">Additional photos (gallery)</label>
      <input id="gallery-input" type="file" accept="image/*" multiple />
      <div id="gallery-preview" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px"></div>

      <div style="display:flex; gap:10px; align-items:center">
        <button class="primary" id="save-btn">Add product</button>
        <button class="secondary" id="cancel-edit-btn" style="display:none">Cancel</button>
      </div>
      <div class="error" id="form-error"></div>
    </div>

    <div class="card">
      <h2>Products</h2>
      <table>
        <thead>
          <tr><th></th><th>Name</th><th>Category</th><th>Price</th><th></th></tr>
        </thead>
        <tbody id="product-rows"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
const API = '/api/admin';
let token = localStorage.getItem('admin_token');
let editingId = null;
let pendingImageBase64 = null;
let pendingImagesBase64 = [];

const loginScreen = document.getElementById('login-screen');
const app = document.getElementById('app');

function showApp() {
  loginScreen.style.display = 'none';
  app.style.display = 'block';
  loadProducts();
}

function showLogin() {
  loginScreen.style.display = 'block';
  app.style.display = 'none';
}

if (token) showApp(); else showLogin();

document.getElementById('login-btn').addEventListener('click', async () => {
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    token = data.token;
    localStorage.setItem('admin_token', token);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
  }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('admin_token');
  token = null;
  showLogin();
});

function authHeaders(extra) {
  return Object.assign({ 'Authorization': `Bearer ${token}` }, extra || {});
}

async function apiFetch(path, options) {
  const res = await fetch(`${API}${path}`, options);
  if (res.status === 401 || res.status === 403) {
    localStorage.removeItem('admin_token');
    token = null;
    showLogin();
    throw new Error('Session expired');
  }
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// Downsize/compress the chosen image client-side (max 900px on the longest
// side, JPEG @ 0.75) before base64-encoding it, so we're not storing
// multi-megabyte photos straight from a phone camera in Postgres.
function fileToCompressedBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not decode image'));
      img.onload = () => {
        const maxDim = 900;
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        resolve(dataUrl.split(',')[1]);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('image').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    pendingImageBase64 = await fileToCompressedBase64(file);
    const preview = document.getElementById('preview');
    preview.src = `data:image/jpeg;base64,${pendingImageBase64}`;
    preview.style.display = 'inline-block';
  } catch (err) {
    document.getElementById('form-error').textContent = err.message;
  }
});

function renderGalleryPreview() {
  const container = document.getElementById('gallery-preview');
  container.innerHTML = '';
  pendingImagesBase64.forEach((base64, index) => {
    const wrap = document.createElement('div');
    wrap.className = 'gallery-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = `data:image/jpeg;base64,${base64}`;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'gallery-remove';
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', () => {
      pendingImagesBase64.splice(index, 1);
      renderGalleryPreview();
    });
    wrap.appendChild(img);
    wrap.appendChild(removeBtn);
    container.appendChild(wrap);
  });
}

document.getElementById('gallery-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  try {
    for (const file of files) {
      pendingImagesBase64.push(await fileToCompressedBase64(file));
    }
    renderGalleryPreview();
  } catch (err) {
    document.getElementById('form-error').textContent = err.message;
  } finally {
    e.target.value = '';
  }
});

function resetForm() {
  editingId = null;
  pendingImageBase64 = null;
  pendingImagesBase64 = [];
  document.getElementById('form-title').textContent = 'Add a product';
  document.getElementById('save-btn').textContent = 'Add product';
  document.getElementById('cancel-edit-btn').style.display = 'none';
  document.getElementById('name').value = '';
  document.getElementById('price').value = '';
  document.getElementById('category').value = 'women';
  document.getElementById('image').value = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('gallery-input').value = '';
  renderGalleryPreview();
  document.getElementById('form-error').textContent = '';
}

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

document.getElementById('save-btn').addEventListener('click', async () => {
  const errEl = document.getElementById('form-error');
  errEl.textContent = '';
  const name = document.getElementById('name').value.trim();
  const price = Number(document.getElementById('price').value);
  const category = document.getElementById('category').value;

  if (!name || !price || price <= 0) {
    errEl.textContent = 'Name and a positive price are required.';
    return;
  }
  if (!editingId && !pendingImageBase64) {
    errEl.textContent = 'Please choose a product photo.';
    return;
  }

  const body = { name, price, category, imagesBase64: pendingImagesBase64 };
  if (pendingImageBase64) body.imageBase64 = pendingImageBase64;

  try {
    if (editingId) {
      await apiFetch(`/products/${editingId}`, {
        method: 'PATCH',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(body),
      });
    } else {
      await apiFetch('/products', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(body),
      });
    }
    resetForm();
    loadProducts();
  } catch (e) {
    errEl.textContent = e.message;
  }
});

function startEdit(product) {
  editingId = product.id;
  pendingImageBase64 = null;
  pendingImagesBase64 = Array.isArray(product.imagesBase64) ? [...product.imagesBase64] : [];
  document.getElementById('form-title').textContent = `Editing "${product.name}"`;
  document.getElementById('save-btn').textContent = 'Save changes';
  document.getElementById('cancel-edit-btn').style.display = 'inline-block';
  document.getElementById('name').value = product.name;
  document.getElementById('price').value = product.price;
  document.getElementById('category').value = product.category;
  document.getElementById('image').value = '';
  document.getElementById('gallery-input').value = '';
  renderGalleryPreview();
  const preview = document.getElementById('preview');
  if (product.imageBase64) {
    preview.src = `data:image/jpeg;base64,${product.imageBase64}`;
    preview.style.display = 'inline-block';
  } else {
    preview.style.display = 'none';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"? This can't be undone.`)) return;
  try {
    await apiFetch(`/products/${id}`, { method: 'DELETE', headers: authHeaders() });
    loadProducts();
  } catch (e) {
    alert(e.message);
  }
}

async function loadProducts() {
  const rows = document.getElementById('product-rows');
  rows.innerHTML = '<tr><td colspan="5">Loading…</td></tr>';
  try {
    const products = await apiFetch('/products', { headers: authHeaders() });
    if (!products.length) {
      rows.innerHTML = '<tr><td colspan="5">No products yet.</td></tr>';
      return;
    }
    rows.innerHTML = '';
    for (const p of products) {
      const tr = document.createElement('tr');

      const imgTd = document.createElement('td');
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = p.imageBase64 ? `data:image/jpeg;base64,${p.imageBase64}` : '';
      imgTd.appendChild(img);

      const nameTd = document.createElement('td');
      nameTd.textContent = p.name;

      const catTd = document.createElement('td');
      catTd.textContent = p.category;

      const priceTd = document.createElement('td');
      priceTd.textContent = `₹${p.price}`;

      const actionsTd = document.createElement('td');
      actionsTd.className = 'row-actions';
      const editBtn = document.createElement('button');
      editBtn.className = 'secondary';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', () => startEdit(p));
      const delBtn = document.createElement('button');
      delBtn.className = 'secondary danger';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => deleteProduct(p.id, p.name));
      actionsTd.appendChild(editBtn);
      actionsTd.appendChild(delBtn);

      tr.appendChild(imgTd);
      tr.appendChild(nameTd);
      tr.appendChild(catTd);
      tr.appendChild(priceTd);
      tr.appendChild(actionsTd);
      rows.appendChild(tr);
    }
  } catch (e) {
    rows.innerHTML = `<tr><td colspan="5" class="error">${e.message}</td></tr>`;
  }
}
</script>
</body>
</html>
