<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{OG_TITLE}}</title>
<meta property="og:site_name" content="The Shoolins" />
<meta property="og:title" content="{{OG_TITLE}}" />
<meta property="og:description" content="{{OG_DESCRIPTION}}" />
<meta property="og:image" content="{{OG_IMAGE}}" />
<meta property="og:url" content="{{OG_URL}}" />
<meta property="og:type" content="product" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="stylesheet" href="/shop.css" />
<style>
  .pd-wrap { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 40px; }
  @media (max-width: 760px) { .pd-wrap { grid-template-columns: 1fr; } }
  .pd-gallery { position: relative; width: 100%; height: 0; padding-bottom: 117.65%; border-radius: 14px; overflow: hidden; background: var(--divider); }
  .pd-gallery .slides-track { position: absolute; inset: 0; display: flex; touch-action: pan-y; cursor: grab; }
  .pd-gallery .slides-track img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; -webkit-user-drag: none; user-select: none; }
  .pd-arrow-btn {
    position: absolute; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.9); border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.2); color: var(--ink); z-index: 2;
  }
  .pd-arrow-btn svg { width: 20px; height: 20px; }
  .pd-arrow-btn.prev { left: 12px; }
  .pd-arrow-btn.next { right: 12px; }
  .pd-wish-btn {
    position: absolute; top: 14px; right: 14px; width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.2); font-size: 17px; color: var(--muted); z-index: 2;
  }
  .pd-wish-btn.active { color: var(--error); }
  .pd-share-btn {
    position: absolute; top: 64px; right: 14px; width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.2); color: #25d366; z-index: 2;
  }
  .pd-share-btn svg { width: 19px; height: 19px; }
  .pd-zoom-btn {
    position: absolute; top: 14px; left: 14px; width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.2); color: var(--muted); z-index: 2;
  }
  .pd-zoom-btn svg { width: 18px; height: 18px; }
  .zoom-backdrop {
    position: fixed; inset: 0; background: rgba(6,14,30,0.94); z-index: 300;
    display: flex; align-items: center; justify-content: center; animation: fade-in 0.2s ease both;
  }
  .zoom-viewport { width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
  .zoom-viewport img {
    max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; -webkit-user-drag: none;
    will-change: transform; cursor: zoom-in;
  }
  .zoom-viewport img.zoomed { cursor: grab; }
  .size-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .size-chip {
    width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--divider); cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .size-chip.selected { background: var(--navy); color: var(--gold-light); border-color: var(--navy); }
  .qty-row { display: flex; align-items: center; gap: 16px; }
  .qty-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--divider); background: var(--surface);
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .qty-value { font-weight: 700; font-size: 16px; min-width: 24px; text-align: center; }
</style>
</head>
<body>

<div id="shop-nav-mount"></div>

<main class="shop-main" id="pd-root">
  <p class="muted">Loading…</p>
</main>

<div id="shop-footer-mount"></div>

<script src="/i18n.js"></script>
<script src="/shop.js"></script>
<script>
  Shop.renderNav('shop');
  Shop.renderFooter();
  I18N.apply();

  const CATEGORY_COPY = {
    women: 'Cut from breathable, lightweight fabric with a relaxed silhouette that moves with you. Designed to layer effortlessly, season to season.',
    men: 'Tailored from durable, breathable cotton with a clean, considered fit. Built for everyday wear that holds its shape.',
  };
  const DEFAULT_COPY = 'Crafted from breathable cotton with a relaxed fit. A quiet, versatile piece designed to last.';
  const SIZES = ['S', 'M', 'L', 'XL'];

  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let quantity = 1;
  let selectedSize = 'M';
  let product = null;
  let wished = false;
  let currentSlideIndex = 0;

  function galleryImages(p) {
    return Shop.productGalleryUrls(p);
  }

  async function loadProduct() {
    const root = document.getElementById('pd-root');
    if (!productId) {
      root.innerHTML = '<p class="muted">No product specified.</p>';
      return;
    }
    try {
      product = await Shop.apiFetch(`/products/${encodeURIComponent(productId)}`);
      if (Shop.isLoggedIn()) {
        try {
          const items = await Shop.apiFetch('/wishlist');
          wished = items.some((i) => i.productId === product.id);
        } catch (e) { /* ignore */ }
      }
      renderProduct();
    } catch (e) {
      root.innerHTML = `<p class="muted">Could not load product: ${e.message}</p>`;
    }
  }

  function renderProduct() {
    const root = document.getElementById('pd-root');
    const images = galleryImages(product);
    const copy = CATEGORY_COPY[product.category] || DEFAULT_COPY;

    root.innerHTML = `
      <div class="pd-wrap">
        <div class="pd-gallery">
          <button class="pd-wish-btn ${wished ? 'active' : ''}" id="wish-btn">${wished ? '&#10084;' : '&#9825;'}</button>
          <button class="pd-share-btn" id="share-btn" title="Share on WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2zm0 1.67c4.55 0 8.25 3.7 8.25 8.24 0 4.55-3.7 8.25-8.25 8.25-1.6 0-3.15-.46-4.5-1.32l-.32-.2-3.12.82.83-3.04-.21-.32a8.18 8.18 0 0 1-1.26-4.19c0-4.54 3.7-8.24 8.25-8.24h.33zm-4.6 4.62c-.15 0-.4.06-.58.27-.19.21-.72.71-.72 1.73 0 1.02.74 2 .84 2.15.1.14 1.4 2.24 3.45 3.05 1.7.68 2.05.55 2.42.51.37-.04 1.2-.49 1.37-.96.17-.47.17-.87.12-.96-.05-.1-.19-.16-.4-.27-.21-.11-1.25-.62-1.44-.69-.19-.07-.34-.11-.48.11-.14.21-.55.69-.68.83-.12.14-.25.15-.46.05-.21-.1-.9-.33-1.72-1.06-.63-.56-1.05-1.25-1.18-1.46-.12-.21-.01-.32.1-.43.11-.11.25-.28.37-.42.12-.14.16-.24.24-.4.08-.16.04-.31-.02-.42-.06-.11-.5-1.2-.68-1.65-.16-.4-.34-.35-.48-.36h-.42z"/></svg></button>
          <button class="pd-zoom-btn" id="zoom-btn" title="Zoom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg></button>
          <div class="slides-track" id="slides-track"></div>
          ${images.length > 1 ? `
            <button class="pd-arrow-btn prev" id="gallery-prev" title="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button class="pd-arrow-btn next" id="gallery-next" title="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
          ` : ''}
        </div>
        <div>
          <span class="eyebrow" style="text-transform:uppercase;color:var(--gold-dark);font-size:12px;font-weight:700;letter-spacing:1.5px">${product.category}</span>
          <h1 class="serif" style="margin:6px 0 10px;font-size:30px">${product.name}</h1>
          <p class="serif" style="font-size:24px;font-weight:700;color:var(--gold-dark);margin:0 0 18px">${Shop.formatInr(product.price)}</p>
          <p class="muted" style="line-height:1.7">${copy}</p>

          <label>Size</label>
          <div class="size-row" id="size-row"></div>

          <label>Quantity</label>
          <div class="qty-row">
            <button class="qty-btn" id="qty-minus">&minus;</button>
            <span class="qty-value" id="qty-value">1</span>
            <button class="qty-btn" id="qty-plus">+</button>
          </div>

          <div style="margin-top:28px;display:flex;flex-direction:column;gap:12px">
            <button class="btn btn-gold shine" id="add-to-cart-btn" data-i18n="addToCartBtn">Add to Cart</button>
            <button class="btn btn-outline" id="buy-now-btn" data-i18n="buyNowBtn">Buy Now</button>
          </div>
        </div>
      </div>
      ${images.length > 1 ? `<div class="gallery-dots" id="gallery-dots"></div>` : ''}
    `;

    // Images are fetched from real backend URLs (galleryImages ->
    // Shop.productGalleryUrls) rather than embedded as data: URIs —
    // several large base64-encoded images inline on one page proved
    // unreliable on some mobile browsers; a normal <img src="url"> goes
    // through the standard network image pipeline instead.
    const slidesTrack = document.getElementById('slides-track');
    images.forEach((src) => {
      const imgEl = document.createElement('img');
      imgEl.alt = product.name;
      imgEl.draggable = false;
      imgEl.src = src;
      slidesTrack.appendChild(imgEl);
    });

    const sizeRow = document.getElementById('size-row');
    SIZES.forEach((s) => {
      const chip = document.createElement('div');
      chip.className = 'size-chip' + (s === selectedSize ? ' selected' : '');
      chip.textContent = s;
      chip.addEventListener('click', () => {
        selectedSize = s;
        sizeRow.querySelectorAll('.size-chip').forEach((c) => c.classList.toggle('selected', c === chip));
      });
      sizeRow.appendChild(chip);
    });

    document.getElementById('qty-minus').addEventListener('click', () => setQty(quantity - 1));
    document.getElementById('qty-plus').addEventListener('click', () => setQty(quantity + 1));

    document.getElementById('wish-btn').addEventListener('click', toggleWishlist);
    document.getElementById('share-btn').addEventListener('click', shareOnWhatsApp);
    document.getElementById('add-to-cart-btn').addEventListener('click', addToCart);
    document.getElementById('buy-now-btn').addEventListener('click', buyNow);

    currentSlideIndex = 0;
    document.getElementById('zoom-btn').addEventListener('click', () => setupZoom(images, currentSlideIndex));
    Shop.markBrokenImagesWithFallback(root);

    if (images.length > 1) {
      setupGallery(images.length);
    }
    I18N.apply(root);
  }

  // Full-screen zoom viewer: pinch (two-finger) to scale, drag to pan while
  // zoomed, double-tap/double-click to toggle between 1x and ~2.2x.
  function setupZoom(images, startIndex) {
    const backdrop = document.createElement('div');
    backdrop.className = 'zoom-backdrop';
    backdrop.innerHTML = `
      <button class="modal-close-btn" id="zoom-close">&times;</button>
      <div class="zoom-viewport" id="zoom-viewport">
        <img src="${images[startIndex]}" id="zoom-img" draggable="false" />
      </div>
    `;
    document.body.appendChild(backdrop);

    const viewport = backdrop.querySelector('#zoom-viewport');
    const img = backdrop.querySelector('#zoom-img');
    const pointers = new Map();
    let scale = 1, tx = 0, ty = 0;
    let pinchStartDist = 0, pinchStartScale = 1;
    let panStart = null;
    let lastTapTime = 0;

    function apply() {
      img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      img.classList.toggle('zoomed', scale > 1);
    }

    function clamp() {
      scale = Math.min(Math.max(scale, 1), 4);
      if (scale === 1) { tx = 0; ty = 0; }
    }

    function toggleZoom() {
      if (scale > 1) { scale = 1; tx = 0; ty = 0; }
      else { scale = 2.2; }
      apply();
    }

    viewport.addEventListener('pointerdown', (e) => {
      try { viewport.setPointerCapture(e.pointerId); } catch (err) { /* pointer already released — ignore */ }
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 2) {
        const [p1, p2] = [...pointers.values()];
        pinchStartDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        pinchStartScale = scale;
      } else if (pointers.size === 1) {
        panStart = { x: e.clientX - tx, y: e.clientY - ty };
      }
    });
    viewport.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 2) {
        const [p1, p2] = [...pointers.values()];
        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        if (pinchStartDist > 0) scale = pinchStartScale * (dist / pinchStartDist);
        clamp();
        apply();
      } else if (pointers.size === 1 && scale > 1 && panStart) {
        tx = e.clientX - panStart.x;
        ty = e.clientY - panStart.y;
        apply();
      }
    });
    function endPointer(e) {
      const wasSingleTap = pointers.size === 1 && panStart
        && Math.abs(e.clientX - (panStart.x + tx)) < 6
        && Math.abs(e.clientY - (panStart.y + ty)) < 6;
      pointers.delete(e.pointerId);
      if (pointers.size < 2) pinchStartDist = 0;
      if (pointers.size === 0) {
        panStart = null;
        if (wasSingleTap) {
          const now = Date.now();
          if (now - lastTapTime < 300) toggleZoom();
          lastTapTime = now;
        }
      }
    }
    viewport.addEventListener('pointerup', endPointer);
    viewport.addEventListener('pointercancel', endPointer);

    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
    backdrop.querySelector('#zoom-close').addEventListener('click', close);
    function close() { backdrop.remove(); }
  }

  // Pointer-driven carousel (no native overflow-x scroll) so a normal mouse
  // wheel / trackpad vertical scroll always scrolls the page — a native
  // horizontally-scrollable element would otherwise capture vertical wheel
  // input and redirect it sideways, fighting with the page's own scroll.
  function setupGallery(count) {
    const track = document.getElementById('slides-track');
    const dotsEl = document.getElementById('gallery-dots');
    let index = 0;
    let pointerActive = false;
    let dragging = false;
    let directionDecided = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragDeltaX = 0;

    for (let i = 0; i < count; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(dot);
    }

    function goTo(i) {
      index = Math.max(0, Math.min(count - 1, i));
      currentSlideIndex = index;
      track.style.transition = 'transform 0.3s ease';
      track.style.transform = `translateX(-${index * 100}%)`;
      dotsEl.querySelectorAll('.dot').forEach((d, i2) => d.classList.toggle('active', i2 === index));
    }

    document.getElementById('gallery-prev').addEventListener('click', () => goTo(index - 1 < 0 ? count - 1 : index - 1));
    document.getElementById('gallery-next').addEventListener('click', () => goTo(index + 1 >= count ? 0 : index + 1));

    track.addEventListener('pointerdown', (e) => {
      pointerActive = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragDeltaX = 0;
      dragging = false;
      directionDecided = false;
    });
    // Direction is decided only once the gesture has moved a few pixels —
    // capturing the pointer immediately on pointerdown (the previous
    // approach) hijacked every touch, including a plain vertical scroll,
    // before the browser could tell it apart from a horizontal swipe.
    // Bailing out when the pointer was never actually pressed also
    // matters: a plain hover fires pointermove too, and without this
    // check the stale dragStartX/dragStartY (from before any press) would
    // be diffed against the live cursor position, producing a huge fake
    // "drag" delta that shoved the whole track off-screen.
    track.addEventListener('pointermove', (e) => {
      if (!pointerActive) return;
      if (directionDecided && !dragging) return;
      const deltaX = e.clientX - dragStartX;
      const deltaY = e.clientY - dragStartY;
      if (!directionDecided) {
        if (Math.abs(deltaX) < 8 && Math.abs(deltaY) < 8) return;
        directionDecided = true;
        if (Math.abs(deltaX) <= Math.abs(deltaY)) return; // vertical — let native scroll handle it
        dragging = true;
        track.style.transition = 'none';
        track.style.cursor = 'grabbing';
        try { track.setPointerCapture(e.pointerId); } catch (err) { /* pointer already released — ignore */ }
      }
      if (!dragging) return;
      dragDeltaX = deltaX;
      track.style.transform = `translateX(calc(-${index * 100}% + ${dragDeltaX}px))`;
    });
    function endDrag() {
      if (dragging) {
        dragging = false;
        track.style.cursor = 'grab';
        if (dragDeltaX < -50 && index < count - 1) goTo(index + 1);
        else if (dragDeltaX > 50 && index > 0) goTo(index - 1);
        else goTo(index);
      }
      pointerActive = false;
      directionDecided = false;
    }
    track.addEventListener('pointerup', endDrag);
    track.addEventListener('pointercancel', endDrag);
  }

  function setQty(v) {
    quantity = Math.max(1, Math.min(10, v));
    document.getElementById('qty-value').textContent = quantity;
  }

  function shareOnWhatsApp() {
    const url = `${window.location.origin}/product.html?id=${encodeURIComponent(product.id)}&utm_source=whatsapp&utm_medium=share`;
    const text = `${product.name} — ${Shop.formatInr(product.price)} at The Shoolins\n${url}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }

  async function toggleWishlist() {
    if (!Shop.requireLogin()) return;
    try {
      if (wished) {
        await Shop.apiFetch(`/wishlist/${product.id}`, { method: 'DELETE' });
      } else {
        await Shop.apiFetch('/wishlist', { method: 'POST', body: JSON.stringify({ productId: product.id }) });
      }
      wished = !wished;
      const btn = document.getElementById('wish-btn');
      btn.classList.toggle('active', wished);
      btn.innerHTML = wished ? '&#10084;' : '&#9825;';
    } catch (e) {
      Shop.toast(e.message);
    }
  }

  async function addToCart() {
    if (!Shop.requireLogin()) return;
    try {
      await Shop.apiFetch('/cart', { method: 'POST', body: JSON.stringify({ productId: product.id, quantity }) });
      Shop.toast(`${product.name} added to cart`);
      Shop.refreshCartCount();
    } catch (e) {
      Shop.toast(e.message);
    }
  }

  async function buyNow() {
    if (!Shop.requireLogin()) return;
    try {
      await Shop.apiFetch('/cart', { method: 'POST', body: JSON.stringify({ productId: product.id, quantity }) });
      const cart = await Shop.apiFetch('/cart');
      const amount = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
      const paid = await Shop.showPaymentSheet(amount);
      if (!paid) return;
      const order = await Shop.apiFetch('/orders/checkout', { method: 'POST' });
      Shop.refreshCartCount();
      Shop.toast('Order placed successfully!');
      window.location.href = '/orders.html';
    } catch (e) {
      Shop.toast(e.message);
    }
  }

  loadProduct();
</script>
</body>
</html>
