<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Support Chat — The Shoolins</title>
<meta property="og:site_name" content="The Shoolins" />
<meta property="og:title" content="Support Chat — The Shoolins" />
<meta property="og:description" content="Chat with our team." />
<meta property="og:image" content="https://the-shoolins.onrender.com/media/logo.png" />
<meta property="og:url" content="https://the-shoolins.onrender.com/support-chat.html" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<link rel="stylesheet" href="/shop.css" />
<style>
  .chat-window {
    height: 60vh; min-height: 320px; overflow-y: auto; padding: 16px;
    border: 1px solid var(--divider); border-radius: 10px; background: var(--cream);
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-bubble-row { display: flex; }
  .chat-bubble-row.customer { justify-content: flex-end; }
  .chat-bubble {
    max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4;
    white-space: pre-wrap; word-break: break-word;
  }
  .chat-bubble-row.customer .chat-bubble { background: var(--gold); color: var(--navy-deep); border-bottom-right-radius: 4px; }
  .chat-bubble-row.admin .chat-bubble { background: var(--surface); border: 1px solid var(--divider); border-bottom-left-radius: 4px; }
  .chat-input-row { display: flex; gap: 10px; margin-top: 14px; }
  .chat-input-row input { flex: 1; }
</style>
</head>
<body>

<div id="shop-nav-mount"></div>

<div class="page-banner">
  <h1>Support Chat</h1>
  <p>Chat with our team — we usually reply within a day</p>
</div>

<main class="shop-main narrow" id="chat-root">
  <p class="muted">Loading…</p>
</main>

<div id="shop-footer-mount"></div>

<script src="/i18n.js"></script>
<script src="/shop.js"></script>
<script>
  Shop.renderNav();
  Shop.renderFooter();
  I18N.apply();

  let pollTimer = null;
  let lastRenderedCount = 0;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderMessages(messages) {
    const box = document.getElementById('chat-messages');
    if (!box) return;
    if (messages.length === lastRenderedCount) return;
    lastRenderedCount = messages.length;
    box.innerHTML = messages.map((m) => `
      <div class="chat-bubble-row ${m.sender}">
        <div class="chat-bubble">${escapeHtml(m.message)}</div>
      </div>
    `).join('') || '<p class="muted" style="text-align:center">Send us a message to start the conversation.</p>';
    box.scrollTop = box.scrollHeight;
  }

  async function loadMessages() {
    try {
      const messages = await Shop.apiFetch('/chat');
      renderMessages(messages);
    } catch (e) { /* transient poll failure — ignore, will retry */ }
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    const btn = document.getElementById('chat-send-btn');
    btn.disabled = true;
    try {
      await Shop.apiFetch('/chat', { method: 'POST', body: JSON.stringify({ message }) });
      input.value = '';
      lastRenderedCount = -1;
      await loadMessages();
    } catch (e) {
      Shop.toast(e.message);
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function renderChatUI() {
    const root = document.getElementById('chat-root');
    root.innerHTML = `
      <div class="card">
        <div class="chat-window" id="chat-messages"><p class="muted">Loading…</p></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="Type your message…" />
          <button class="btn btn-gold shine" id="chat-send-btn">Send</button>
        </div>
      </div>
    `;
    document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    loadMessages();
    pollTimer = setInterval(loadMessages, 5000);
  }

  function init() {
    const root = document.getElementById('chat-root');
    if (!Shop.isLoggedIn()) {
      root.innerHTML = `
        <div class="empty-state">
          <div class="icon">&#128172;</div>
          <p>Log in to chat with our team.</p>
          <a href="/login.html?next=/support-chat.html" class="btn btn-navy shine" style="margin-top:10px">Log In</a>
        </div>`;
      return;
    }
    renderChatUI();
  }

  window.addEventListener('beforeunload', () => { if (pollTimer) clearInterval(pollTimer); });

  init();
</script>
</body>
</html>
