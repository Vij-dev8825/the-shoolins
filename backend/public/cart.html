<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cart — The Shoolins</title>
<link rel="stylesheet" href="/shop.css" />
<style>
  .cart-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--divider); align-items: center; }
  .cart-item img { width: 76px; height: 90px; object-fit: cover; border-radius: 8px; background: var(--divider); }
  .cart-item .info { flex: 1; }
  .cart-item .name { font-weight: 600; font-size: 14px; }
  .cart-item .price { color: var(--gold-dark); font-weight: 700; font-family: 'Playfair Display', serif; margin-top: 4px; }
  .qty-controls { display: flex; align-items: center; gap: 10px; }
  .qty-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--divider); background: var(--surface); cursor: pointer; }
  .remove-link { color: var(--error); font-size: 12px; cursor: pointer; margin-top: 6px; display: inline-block; }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
  .summary-row.total { font-weight: 700; font-size: 18px; border-top: 1px solid var(--divider); padding-top: 14px; margin-top: 6px; }
</style>
</head>
<body>

<div id="shop-nav-mount"></div>

<div class="page-banner">
  <h1 data-i18n="cartBannerTitle">Your Cart</h1>
  <p data-i18n="cartBannerSub">Review your selections before checkout</p>
</div>

<main class="shop-main narrow" id="cart-root">
  <p class="muted">Loading…</p>
</main>

<div id="shop-footer-mount"></div>

<script src="/i18n.js"></script>
<script src="/shop.js"></script>
<script>
  Shop.renderNav('cart');
  Shop.renderFooter();
  I18N.apply();

  let cart = [];

  async function loadCart() {
    const root = document.getElementById('cart-root');
    if (!Shop.isLoggedIn()) {
      root.innerHTML = `
        <div class="empty-state">
          <div class="icon">&#128092;</div>
          <p>Log in to view your cart.</p>
          <a href="/login.html?next=/cart.html" class="btn btn-navy shine" style="margin-top:10px">Log In</a>
        </div>`;
      return;
    }
    try {
      cart = await Shop.apiFetch('/cart');
      renderCart();
    } catch (e) {
      root.innerHTML = `<p class="muted">Could not load cart: ${e.message}</p>`;
    }
  }

  function renderCart() {
    const root = document.getElementById('cart-root');
    if (!cart.length) {
      root.innerHTML = `
        <div class="empty-state">
          <div class="icon">&#128092;</div>
          <p>Your cart is empty.</p>
          <a href="/shop.html" class="btn btn-navy shine" style="margin-top:10px">Continue Shopping</a>
        </div>`;
      return;
    }
    const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
    root.innerHTML = `
      <div class="card">
        <div id="cart-items"></div>
        <div class="summary-row"><span>Subtotal</span><span>${Shop.formatInr(total)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>Free</span></div>
        <div class="summary-row total"><span>Total</span><span style="color:var(--gold-dark)">${Shop.formatInr(total)}</span></div>
        <button class="btn btn-gold btn-block shine" id="checkout-btn" style="margin-top:18px" data-i18n="checkoutBtn">Checkout</button>
      </div>
    `;
    I18N.apply(root);
    const itemsEl = document.getElementById('cart-items');
    cart.forEach((item) => {
      const row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = `
        <img src="${Shop.imageSrc(item)}" alt="${item.name}" />
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="price">${Shop.formatInr(item.price)}</div>
          <div class="remove-link" data-id="${item.productId}">Remove</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" data-action="dec" data-id="${item.productId}">&minus;</button>
          <span>${item.quantity}</span>
          <button class="qty-btn" data-action="inc" data-id="${item.productId}">+</button>
        </div>
      `;
      itemsEl.appendChild(row);
    });
    itemsEl.querySelectorAll('.qty-btn').forEach((btn) => {
      btn.addEventListener('click', () => changeQty(btn.dataset.id, btn.dataset.action));
    });
    itemsEl.querySelectorAll('.remove-link').forEach((el) => {
      el.addEventListener('click', () => removeItem(el.dataset.id));
    });
    document.getElementById('checkout-btn').addEventListener('click', checkout);
  }

  async function changeQty(productId, action) {
    const item = cart.find((i) => i.productId === productId);
    if (!item) return;
    const newQty = action === 'inc' ? item.quantity + 1 : item.quantity - 1;
    try {
      cart = await Shop.apiFetch(`/cart/${productId}`, { method: 'PATCH', body: JSON.stringify({ quantity: newQty }) });
      renderCart();
      Shop.refreshCartCount();
    } catch (e) {
      Shop.toast(e.message);
    }
  }

  async function removeItem(productId) {
    try {
      cart = await Shop.apiFetch(`/cart/${productId}`, { method: 'DELETE' });
      renderCart();
      Shop.refreshCartCount();
    } catch (e) {
      Shop.toast(e.message);
    }
  }

  async function checkout() {
    const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
    const paid = await Shop.showPaymentSheet(total);
    if (!paid) return;
    try {
      await Shop.apiFetch('/orders/checkout', { method: 'POST' });
      Shop.refreshCartCount();
      Shop.toast('Order placed successfully!');
      window.location.href = '/orders.html';
    } catch (e) {
      Shop.toast(e.message);
    }
  }

  loadCart();
</script>
</body>
</html>
