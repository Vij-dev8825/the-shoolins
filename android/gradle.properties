org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError
# This machine is memory-constrained; keep the build single-threaded and avoid
# leaving a daemon resident afterwards so it doesn't compete with other apps.
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
android.useAndroidX=true
# Kotlin's incremental compiler computes a relative path between the pub cache
# (on C:) and this project's build dir (on E:), which throws "different roots"
# on Windows when the two are on different drives. Disabling incremental
# compilation avoids that path computation entirely.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
